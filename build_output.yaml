apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/instance: my-listmonk
    app.kubernetes.io/managed-by: timoni
    app.kubernetes.io/name: listmonk
    app.kubernetes.io/version: 6.0.0
    helm.sh/chart: listmonk-6.0.0
  name: my-listmonk-listmonk-postgres-migration
  namespace: listmonk
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 3
  template:
    metadata:
      name: postgres-migration
    spec:
      containers:
      - args:
        - delete
        - statefulset
        - -n
        - listmonk
        - -l
        - app.kubernetes.io/name=listmonk-postgres,app.kubernetes.io/instance=my-listmonk,app.kubernetes.io/managed-by=Helm
        - --cascade=orphan
        - --ignore-not-found
        image: registry.k8s.io/kubectl:v1.36.1
        name: migrate
      restartPolicy: OnFailure
      serviceAccountName: my-listmonk-listmonk-migration
  ttlSecondsAfterFinished: 300
