apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: my-listmonk
    app.kubernetes.io/managed-by: timoni
    app.kubernetes.io/name: listmonk
    app.kubernetes.io/version: 6.0.0
    helm.sh/chart: listmonk-6.0.0
  name: listmonk-postgres
  namespace: listmonk
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: my-listmonk
      app.kubernetes.io/name: listmonk-postgres
  serviceName: listmonk-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: my-listmonk
        app.kubernetes.io/name: listmonk-postgres
    spec:
      containers:
      - env:
        - name: POSTGRES_USER
          value: listmonk
        - name: POSTGRES_DB
          value: listmonk
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: my-listmonk-listmonk-db
        image: postgres:18
        imagePullPolicy: IfNotPresent
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -h
            - localhost
            - -U
            - listmonk
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: data
      serviceAccountName: my-listmonk-listmonk
  volumeClaimTemplates:
  - metadata:
      labels:
        app.kubernetes.io/instance: my-listmonk
        app.kubernetes.io/name: listmonk-postgres
      name: data
    spec:
      accessModes:
